<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIP Settings - AI Voice Agent</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">AV</div>
                <div class="sidebar-toggle" id="sidebarToggle"><span>☰</span></div>
            </div>
            <div class="sidebar-nav">
                <a href="dialer.html" class="nav-item"><span>📞</span><span class="nav-label">Dialer</span></a>
                <a href="agents.html" class="nav-item"><span>🤖</span><span class="nav-label">Agents</span></a>
                <a href="sip-settings.html" class="nav-item active"><span>📡</span><span class="nav-label">SIP
                        Settings</span></a>
            </div>
        </nav>

        <main class="main-content">
            <div class="content-card">
                <header style="text-align: center; margin-bottom: 2rem;">
                    <h2>Manage Your SIP Numbers</h2>
                    <p class="subtitle">Add multiple SIP credentials for inbound and outbound calls</p>
                </header>

                <form id="sipForm" class="agent-form">
                    <input type="hidden" id="sipId">
                    <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="input-group">
                            <label for="name">Friendly Name</label>
                            <input type="text" id="name" placeholder="e.g. My VivPhone Number" required>
                        </div>
                        <div class="input-group">
                            <label for="username">SIP Username</label>
                            <input type="text" id="username" placeholder="e.g. 17709924948" required>
                        </div>
                    </div>

                    <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="input-group">
                            <label for="password">SIP Password</label>
                            <input type="password" id="password" placeholder="Leave empty if not needed">
                        </div>
                        <div class="input-group">
                            <label for="domain">SIP Domain / Host</label>
                            <input type="text" id="domain" placeholder="e.g. vivp1.vivphone.com" required>
                        </div>
                    </div>

                    <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">
                        <div class="input-group">
                            <label for="port">SIP Port</label>
                            <input type="number" id="port" value="5060" required>
                        </div>
                        <div class="input-group">
                            <label for="callerId">Caller ID (Number)</label>
                            <input type="text" id="callerId" placeholder="e.g. 17709924948">
                        </div>
                        <div class="input-group">
                            <label for="inboundAgentId">Mapped Agent (Inbound)</label>
                            <select id="inboundAgentId">
                                <option value="">Global Default</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="proxy">Outbound Proxy (Optional)</label>
                        <input type="text" id="proxy" placeholder="e.g. sip.proxy.com">
                    </div>

                    <div class="controls" style="display: flex; gap: 1rem;">
                        <button type="submit" id="saveBtn" class="btn btn-primary">
                            <span>📡</span> Save SIP Number
                        </button>
                        <button type="button" id="cancelBtn" class="btn btn-ghost hidden">
                            Cancel Edit
                        </button>
                    </div>
                </form>

                <div id="sipGrid"
                    style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; margin-top: 3rem;">
                    <!-- SIP accounts will be loaded here -->
                </div>
            </div>
        </main>
    </div>

    <script>
        const sipForm = document.getElementById('sipForm');
        const sipGrid = document.getElementById('sipGrid');
        const saveBtn = document.getElementById('saveBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const sipIdInput = document.getElementById('sipId');
        const agentSelect = document.getElementById('inboundAgentId');
        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebarToggle');

        sidebarToggle.onclick = () => sidebar.classList.toggle('expanded');

        async function fetchAgents() {
            const agents = await fetch('/api/agents').then(r => r.json());
            agentSelect.innerHTML = '<option value="">Global Default</option>' +
                agents.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
        }

        async function fetchSipSettings() {
            const settings = await fetch('/api/sip-settings').then(r => r.json());
            renderSipSettings(settings);
        }

        function renderSipSettings(settings) {
            sipGrid.innerHTML = settings.map(s => `
                <div class="agent-card">
                    <div class="agent-name">${s.name}</div>
                    <div class="agent-voice">${s.username}@${s.domain}</div>
                    <div style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.5rem;">
                        Caller ID: ${s.callerId || 'None'}<br>
                        Port: ${s.port}
                    </div>
                    <div class="controls">
                        <button class="btn btn-ghost" style="padding: 6px 12px; font-size: 0.8rem;" onclick="editSip('${s.id}')">Edit</button>
                        <button class="btn btn-danger" style="padding: 6px 12px; font-size: 0.8rem;" onclick="deleteSip('${s.id}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        sipForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                id: sipIdInput.value || undefined,
                name: document.getElementById('name').value,
                username: document.getElementById('username').value,
                password: document.getElementById('password').value || undefined,
                domain: document.getElementById('domain').value,
                port: parseInt(document.getElementById('port').value, 10),
                callerId: document.getElementById('callerId').value,
                proxy: document.getElementById('proxy').value || undefined,
                inboundAgentId: document.getElementById('inboundAgentId').value || undefined
            };

            await fetch('/api/sip-settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            resetForm();
            fetchSipSettings();
        });

        window.editSip = async (id) => {
            const settings = await fetch('/api/sip-settings').then(r => r.json());
            const s = settings.find(x => x.id === id);
            if (!s) return;

            sipIdInput.value = s.id;
            document.getElementById('name').value = s.name;
            document.getElementById('username').value = s.username;
            document.getElementById('password').value = s.password || '';
            document.getElementById('domain').value = s.domain;
            document.getElementById('port').value = s.port;
            document.getElementById('callerId').value = s.callerId || '';
            document.getElementById('proxy').value = s.proxy || '';
            document.getElementById('inboundAgentId').value = s.inboundAgentId || '';

            saveBtn.innerHTML = '✨ Update SIP Number';
            cancelBtn.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.deleteSip = async (id) => {
            if (!confirm('Are you sure you want to delete this SIP number?')) return;
            await fetch(`/api/sip-settings/${id}`, { method: 'DELETE' });
            fetchSipSettings();
        };

        function resetForm() {
            sipIdInput.value = '';
            sipForm.reset();
            saveBtn.innerHTML = '✨ Save SIP Number';
            cancelBtn.classList.add('hidden');
        }

        cancelBtn.addEventListener('click', resetForm);

        // Initial load
        fetchAgents();
        fetchSipSettings();
    </script>
</body>

</html>
