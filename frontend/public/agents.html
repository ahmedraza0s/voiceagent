<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Setup - AI Voice Agent</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <nav class="nav-bar">
            <h1>AI Setup</h1>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Dialer</a>
                <a href="agents.html" class="nav-link active">Agents</a>
            </div>
        </nav>

        <div class="glass-card">
            <header>
                <h2>Configure Your AI Personalities</h2>
                <p class="subtitle">Create and manage agents for inbound and outbound calls</p>
            </header>

            <form id="agentForm" class="agent-form">
                <input type="hidden" id="agentId">
                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="input-group">
                        <label for="name">Agent Name</label>
                        <input type="text" id="name" placeholder="e.g. Rachel from Support" required>
                    </div>
                    <div class="input-group">
                        <label for="voiceId">Voice Model</label>
                        <select id="voiceId">
                            <optgroup label="Male Voices">
                                <option value="shubh" selected>Shubh (Default)</option>
                                <option value="rahul">Rahul</option>
                                <option value="amit">Amit</option>
                            </optgroup>
                            <optgroup label="Female Voices">
                                <option value="ritu">Ritu</option>
                                <option value="priya">Priya</option>
                                <option value="neha">Neha</option>
                            </optgroup>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label for="systemPrompt">System Prompt (The Agent's Identity)</label>
                    <textarea id="systemPrompt"
                        placeholder="Describe how the AI should behave and what it should say..." required></textarea>
                </div>

                <div class="controls" style="display: flex; gap: 1rem;">
                    <button type="submit" id="saveBtn" class="btn btn-primary">
                        <span>✨</span> Save Agent
                    </button>
                    <button type="button" id="cancelBtn" class="btn btn-ghost hidden">
                        Cancel Edit
                    </button>
                </div>
            </form>

            <div class="agent-grid" id="agentGrid">
                <!-- Agents will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        const agentForm = document.getElementById('agentForm');
        const agentGrid = document.getElementById('agentGrid');
        const saveBtn = document.getElementById('saveBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const agentIdInput = document.getElementById('agentId');

        async function fetchAgents() {
            const [agents, inbound] = await Promise.all([
                fetch('/api/agents').then(r => r.json()),
                fetch('/api/agents/inbound').then(r => r.json())
            ]);
            renderAgents(agents, inbound.id);
        }

        function renderAgents(agents, inboundId) {
            agentGrid.innerHTML = agents.map(agent => `
                <div class="agent-card ${agent.id === inboundId ? 'inbound-default' : ''}">
                    ${agent.id === inboundId ? '<span class="agent-badge badge-success">INBOUND</span>' : ''}
                    <div class="agent-name">${agent.name}</div>
                    <div class="agent-voice">${agent.voiceId}</div>
                    <div style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.5rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">
                        ${agent.systemPrompt}
                    </div>
                    <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                        <button class="btn btn-ghost" style="padding: 6px 12px; font-size: 0.8rem;" onclick="editAgent('${agent.id}')">Edit</button>
                        ${agent.id !== inboundId ? `<button class="btn btn-primary" style="padding: 6px 12px; font-size: 0.8rem; background: var(--success);" onclick="setInbound('${agent.id}')">Set Inbound</button>` : ''}
                        <button class="btn btn-danger" style="padding: 6px 12px; font-size: 0.8rem;" onclick="deleteAgent('${agent.id}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        agentForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                id: agentIdInput.value || undefined,
                name: document.getElementById('name').value,
                voiceId: document.getElementById('voiceId').value,
                systemPrompt: document.getElementById('systemPrompt').value
            };

            await fetch('/api/agents', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            resetForm();
            fetchAgents();
        });

        window.editAgent = async (id) => {
            const agent = await fetch(`/api/agents/${id}`).then(r => r.json());
            agentIdInput.value = agent.id;
            document.getElementById('name').value = agent.name;
            document.getElementById('voiceId').value = agent.voiceId;
            document.getElementById('systemPrompt').value = agent.systemPrompt;
            saveBtn.innerHTML = '✨ Update Agent';
            cancelBtn.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.deleteAgent = async (id) => {
            if (!confirm('Are you sure you want to delete this agent?')) return;
            await fetch(`/api/agents/${id}`, { method: 'DELETE' });
            fetchAgents();
        };

        window.setInbound = async (id) => {
            await fetch('/api/agents/set-inbound', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id })
            });
            fetchAgents();
        };

        function resetForm() {
            agentIdInput.value = '';
            agentForm.reset();
            saveBtn.innerHTML = '✨ Save Agent';
            cancelBtn.classList.add('hidden');
        }

        cancelBtn.addEventListener('click', resetForm);
        fetchAgents();
    </script>
</body>

</html>
