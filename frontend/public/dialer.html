<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dialer | AI Voice</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">AV</div>
                <div class="sidebar-toggle" id="sidebarToggle"><span>☰</span></div>
            </div>
            <div class="sidebar-nav">
                <a href="dialer.html" class="nav-item active"><span>📞</span><span class="nav-label">Dialer</span></a>
                <a href="agents.html" class="nav-item"><span>🤖</span><span class="nav-label">Agents</span></a>
                <a href="sip-settings.html" class="nav-item"><span>📡</span><span class="nav-label">SIP
                        Settings</span></a>
            </div>
        </nav>

        <aside class="side-panel">
            <div id="panel-dialer" class="view-panel">
                <h2>Dialer</h2>
                <p class="subtitle">Active call sessions</p>
                <div id="activeCalls" class="panel-list"></div>
                <div id="noActiveCalls" class="status-box" style="font-size: 0.9rem; color: var(--text-muted);">
                    No active sessions
                </div>
            </div>
        </aside>

        <main class="main-content">
            <section id="content-dialer" class="content-card">
                <header style="text-align: center; margin-bottom: 2.5rem;">
                    <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">Start a Call</h1>
                    <p class="subtitle">Select account, assistant and enter number</p>
                </header>

                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="input-group">
                        <label for="sipSelector">From (SIP Number)</label>
                        <select id="sipSelector" required>
                            <option value="" disabled selected>Loading SIP accounts...</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="agentSelector">To Assistant</label>
                        <select id="agentSelector" required>
                            <option value="" disabled selected>Loading agents...</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label for="phoneNumber">To Number</label>
                    <input type="tel" id="phoneNumber" placeholder="+91 11111 22222" list="format-suggestions">
                    <datalist id="format-suggestions">
                        <option value="+91">India</option>
                        <option value="+1">USA</option>
                    </datalist>
                </div>

                <div class="controls" style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button id="callBtn" class="btn btn-primary" style="flex: 1;"><span>📞</span> Call Now</button>
                    <button id="endBtn" class="btn btn-danger hidden" style="flex: 1;"><span>🚫</span> End Call</button>
                </div>

                <div id="status" class="status-box hidden">
                    <span id="statusText">Ready</span>
                </div>
            </section>
        </main>
    </div>

    <script>
        let agents = [];
        let sipAccounts = [];
        let activeCalls = [];
        let currentCallId = null;

        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebarToggle');
        const phoneNumberInput = document.getElementById('phoneNumber');
        const agentSelector = document.getElementById('agentSelector');
        const sipSelector = document.getElementById('sipSelector');
        const callBtn = document.getElementById('callBtn');
        const endBtn = document.getElementById('endBtn');
        const statusDiv = document.getElementById('status');
        const statusText = document.getElementById('statusText');
        const activeCallsList = document.getElementById('activeCalls');
        const noActiveCallsBox = document.getElementById('noActiveCalls');

        sidebarToggle.onclick = () => sidebar.classList.toggle('expanded');

        async function fetchInitialData() {
            try {
                const [sipRes, agentRes] = await Promise.all([
                    fetch('/api/sip-settings'),
                    fetch('/api/agents')
                ]);
                sipAccounts = await sipRes.json();
                agents = await agentRes.json();

                sipSelector.innerHTML = sipAccounts.length ? sipAccounts.map(s => `<option value="${s.id}">${s.name} (${s.username})</option>`).join('') : '<option value="">No SIP Numbers Found</option>';
                agentSelector.innerHTML = agents.length ? agents.map(a => `<option value="${a.id}">${a.name} (${a.voiceId})</option>`).join('') : '<option value="">No Agents Found</option>';

                if (!sipAccounts.length || !agents.length) callBtn.disabled = true;
                refreshCalls();
            } catch (error) { console.error('Init failure:', error); }
        }

        async function refreshCalls() {
            try {
                const response = await fetch('/api/calls');
                const data = await response.json();
                activeCalls = data.activeCalls || [];

                if (activeCalls.length > 0) {
                    noActiveCallsBox.classList.add('hidden');
                    activeCallsList.innerHTML = activeCalls.map(id => `
                        <div class="panel-item">
                            <div class="panel-item-title">Session ${id.substring(0, 6)}</div>
                            <button class="btn btn-danger" style="margin-top: 0.5rem; padding: 4px 8px; font-size: 0.7rem; width: 100%;" onclick="endSpecificCall('${id}')">Terminate</button>
                        </div>
                    `).join('');
                } else {
                    activeCallsList.innerHTML = '';
                    noActiveCallsBox.classList.remove('hidden');
                }
            } catch (error) { console.error('Call refresh error:', error); }
        }

        callBtn.onclick = async () => {
            const phoneNumber = phoneNumberInput.value.trim();
            if (!phoneNumber) return alert('Enter phone number');

            callBtn.disabled = true;
            statusDiv.classList.remove('hidden');
            statusText.textContent = 'Initiating call...';

            const res = await fetch('/api/call', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phoneNumber, agentId: agentSelector.value, sipId: sipSelector.value })
            });

            const data = await res.json();
            if (data.success) {
                currentCallId = data.callId;
                statusText.textContent = 'Call Active';
                callBtn.classList.add('hidden');
                endBtn.classList.remove('hidden');
                refreshCalls();
            } else {
                statusText.textContent = 'Error: ' + data.error;
                callBtn.disabled = false;
            }
        };

        endBtn.onclick = async () => {
            if (!currentCallId) return;
            await fetch('/api/end-call', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ callId: currentCallId })
            });
            currentCallId = null;
            statusText.textContent = 'Call ended';
            callBtn.classList.remove('hidden');
            callBtn.disabled = false;
            endBtn.classList.add('hidden');
            refreshCalls();
            setTimeout(() => statusDiv.classList.add('hidden'), 3000);
        };

        window.endSpecificCall = async (id) => {
            await fetch('/api/end-call', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ callId: id })
            });
            if (id === currentCallId) {
                currentCallId = null;
                callBtn.classList.remove('hidden');
                endBtn.classList.add('hidden');
            }
            refreshCalls();
        };

        fetchInitialData();
        setInterval(refreshCalls, 5000);
    </script>
</body>

</html>
