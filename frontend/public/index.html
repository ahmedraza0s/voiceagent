<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dialer - AI Voice Agent</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <nav class="nav-bar">
            <h1>AI Dialer</h1>
            <div class="nav-links">
                <a href="index.html" class="nav-link active">Dialer</a>
                <a href="agents.html" class="nav-link">Agents</a>
            </div>
        </nav>

        <div class="glass-card">
            <header>
                <h2>Start a Conversation</h2>
                <p class="subtitle">Select an agent and enter a number to begin</p>
            </header>

            <main>
                <div class="input-group">
                    <label for="agentSelector">Select Assistant</label>
                    <select id="agentSelector" required>
                        <option value="" disabled selected>Loading agents...</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="phoneNumber">Phone Number</label>
                    <input type="tel" id="phoneNumber" placeholder="+91 11111 22222" list="format-suggestions">
                    <datalist id="format-suggestions">
                        <option value="+91">India</option>
                        <option value="+1">USA</option>
                    </datalist>
                </div>

                <div class="controls" style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button id="callBtn" class="btn btn-primary" style="flex: 1;">
                        <span>📞</span> Call Now
                    </button>
                    <button id="endBtn" class="btn btn-danger hidden" style="flex: 1;">
                        <span>🚫</span> End Call
                    </button>
                </div>

                <div id="status" class="status-box hidden">
                    <span id="statusText">Ready</span>
                </div>
            </main>
        </div>

        <div id="activeCalls" class="glass-card hidden" style="margin-top: 2rem; padding: 1.5rem;">
            <h3 style="margin-bottom: 1rem; font-size: 1.1rem;">Active Sessions</h3>
            <ul id="callsList" style="list-style: none;"></ul>
        </div>
    </div>

    <script>
        const phoneNumberInput = document.getElementById('phoneNumber');
        const agentSelector = document.getElementById('agentSelector');
        const callBtn = document.getElementById('callBtn');
        const endBtn = document.getElementById('endBtn');
        const statusDiv = document.getElementById('status');
        const statusText = document.getElementById('statusText');
        const callsList = document.getElementById('callsList');
        const activeCallsDiv = document.getElementById('activeCalls');

        let currentCallId = null;

        async function fetchAgents() {
            try {
                const agents = await fetch('/api/agents').then(r => r.json());
                const inbound = await fetch('/api/agents/inbound').then(r => r.json());

                if (agents.length === 0) {
                    agentSelector.innerHTML = '<option value="">No agents found. Create one in Setup!</option>';
                    callBtn.disabled = true;
                } else {
                    agentSelector.innerHTML = agents.map(a => `
                        <option value="${a.id}" ${a.id === inbound.id ? 'selected' : ''}>
                            ${a.name} (${a.voiceId})${a.id === inbound.id ? ' - [Default Inbound]' : ''}
                        </option>
                    `).join('');
                    callBtn.disabled = false;
                }
            } catch (error) {
                agentSelector.innerHTML = '<option value="">Error loading agents</option>';
            }
        }

        function updateStatus(message, type = 'info') {
            statusDiv.className = 'status-box';
            statusDiv.classList.remove('hidden');
            statusText.textContent = message;

            if (type === 'pulse') statusDiv.classList.add('pulse');
            else if (type === 'success') statusDiv.style.color = 'var(--success)';
            else if (type === 'error') statusDiv.style.color = 'var(--danger)';
            else statusDiv.style.color = 'var(--text-muted)';
        }

        callBtn.addEventListener('click', async () => {
            const phoneNumber = phoneNumberInput.value.trim();
            const agentId = agentSelector.value;

            if (!phoneNumber) return alert('Please enter a phone number');
            if (!agentId) return alert('Please select an agent');

            try {
                callBtn.disabled = true;
                updateStatus('Initiating call...', 'pulse');

                const response = await fetch('/api/call', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phoneNumber, agentId })
                });

                const data = await response.json();

                if (response.status === 429) {
                    updateStatus('⚠️ Call already active', 'error');
                    callBtn.disabled = false;
                    return;
                }

                if (data.success) {
                    currentCallId = data.callId;
                    updateStatus('Call active', 'success');
                    callBtn.classList.add('hidden');
                    endBtn.classList.remove('hidden');
                    refreshCalls();
                } else {
                    throw new Error(data.error || 'Failed to start call');
                }
            } catch (error) {
                updateStatus(error.message, 'error');
                callBtn.disabled = false;
            }
        });

        endBtn.addEventListener('click', async () => {
            if (!currentCallId) return;
            try {
                endBtn.disabled = true;
                updateStatus('Ending call...', 'pulse');
                await fetch('/api/end-call', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ callId: currentCallId })
                });
                currentCallId = null;
                updateStatus('Call ended');
                setTimeout(() => statusDiv.classList.add('hidden'), 3000);
                callBtn.classList.remove('hidden');
                callBtn.disabled = false;
                endBtn.classList.add('hidden');
                endBtn.disabled = false;
                refreshCalls();
            } catch (error) {
                updateStatus('Failed to end call', 'error');
                endBtn.disabled = false;
            }
        });

        async function refreshCalls() {
            try {
                const response = await fetch('/api/calls');
                const data = await response.json();
                if (data.activeCalls && data.activeCalls.length > 0) {
                    activeCallsDiv.classList.remove('hidden');
                    callsList.innerHTML = data.activeCalls.map(id => `
                        <li style="display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--glass-border);">
                            <span style="font-family: monospace; font-size: 0.9rem;">${id}</span>
                            <button class="btn btn-danger" style="padding: 4px 12px; font-size: 0.8rem;" onclick="endSpecificCall('${id}')">End</button>
                        </li>
                    `).join('');
                } else {
                    activeCallsDiv.classList.add('hidden');
                }
            } catch (error) {
                console.error('Failed to fetch active calls', error);
            }
        }

        window.endSpecificCall = async (id) => {
            await fetch('/api/end-call', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ callId: id })
            });
            if (id === currentCallId) {
                currentCallId = null;
                callBtn.classList.remove('hidden');
                endBtn.classList.add('hidden');
                updateStatus('Call ended');
            }
            refreshCalls();
        };

        setInterval(refreshCalls, 5000);
        fetchAgents();
        refreshCalls();
    </script>
</body>

</html>
